[hermes]
# Storage Backend Selection:
# - "opensearch" (default) - For OpenSearch or Elasticsearch 7.x clusters
# - "mock" - For testing without a real backend
#
# If omitted, defaults to "opensearch".
#storage_driver = "opensearch"
#storage_driver = "mock"

# Identity Backend Selection:
#keystone_driver = "mock"

PolicyFilePath = "etc/policy.json"

# OpenSearch Configuration
# Credentials can be set via environment variables:
#   HERMES_OS_USERNAME, HERMES_OS_PASSWORD
[opensearch]
url = "http://localhost:9200"
#username = ""
#password = ""
#max_result_window = "20000"

[keystone]
auth_url = "https://identity-3.staging.cloud.sap/v3/"
#auth_url = "https://keystone.example.com/v3"
username = "hermes"
password = "C0nrad^"
user_domain_name = "Default"
project_name = "service"
project_domain_name = "Default"
#token_cache_time = 900
#memcached_servers = memcached.example.com:11211

# Postgres backs the per-project data-plane-events toggle store.
# Password may also be supplied via HERMES_DB_PASSWORD.
[postgres]
hostname = "localhost"
port = "5432"
username = "hermes"
#password = ""
database = "hermes"

# RabbitMQ settings for audit event emission are configured via env vars:
#   HERMES_RABBITMQ_HOSTNAME    (default: localhost)
#   HERMES_RABBITMQ_PORT        (default: 5672)
#   HERMES_RABBITMQ_USERNAME    (default: guest)
#   HERMES_RABBITMQ_PASSWORD    (default: guest)
#   HERMES_RABBITMQ_QUEUE_NAME  (REQUIRED -- no default; absence aborts startup)
